<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="utf-8">
  <title></title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body style="background-color: #FEFFD2;" onload="cartpagedisplay()">
  <div class="container-fluid contain1">
  <section class="cart-list">
    <div class="cart-title">
      <hr>
      <h3 class="h3-title">Cart</h3>
      <hr>
    </div>

    <div class="row container-fluid cart-label">
      <div class="col-3" style="padding-left: 2%;">
        <h4 class="h42">Item Image</h4>
      </div>
      <div class="col-3">
        <h4 class="h42">Item Name</h4>
      </div>
      <div class="col-3">
        <h4 class="h42">Price</h4>
      </div>
      <div class="col-3">
        <h4 class="h42">Remove</h4>
      </div>
      <hr>
    </div>
    <div class="row container-fluid product-container">

    </div>
    <div class="row container-fluid">
      <div class="col-3">
      </div>
      <div class="col-3">
      </div>
      <div class="col-3">
        <p class="ltp">Total Price= <span id="totalprice"></span></p>
      </div>
      <div class="d-flex justify-content-end gap-3">
        <a class="btn" href="index.html" id="returnbtn">Continue Shopping</a>
        <a class="btn" href="" onclick="removeitem()" id="delbtn">Remove</a>
        <a href="register.html" class="btn" id="orderbtn">Place Order</a>
      </div>
    </div>
  </section>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js" integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN" crossorigin="anonymous"></script>
